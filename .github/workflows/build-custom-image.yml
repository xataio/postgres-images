name: Build CNPG Postgres Plus Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      cnpg_base:
        description: 'CNPG base image'
        required: true
        default: 'standard'
        type: choice
        options:
          - 'standard'
          - 'minimal'
      custom_cnpg_base:
        description: 'Custom CNPG base image (optional - overrides the choice above)'
        required: false
        type: string
  schedule:
    - cron: '0 2 * * 3' # Every Wednesday at 2 AM UTC

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      PLATFORMS: linux/amd64,linux/arm64
      IMAGE_NAME: xataio/postgres-images/cnpg-postgres-plus
      DOCKERFILE_DIR: docker/custom-postgres
      DEFAULT_CNPG_BASE: ghcr.io/cloudnative-pg/postgresql:17-minimal-bookworm
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine CNPG base image
        id: cnpg_base
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ github.event.inputs.custom_cnpg_base }}" ]]; then
              echo "base=${{ github.event.inputs.custom_cnpg_base }}" >> $GITHUB_OUTPUT
            elif [[ "${{ github.event.inputs.cnpg_base }}" == "minimal" ]]; then
              echo "base=ghcr.io/cloudnative-pg/postgresql:17-minimal-bookworm" >> $GITHUB_OUTPUT
            else
              echo "base=ghcr.io/cloudnative-pg/postgresql:17-standard-bookworm" >> $GITHUB_OUTPUT
            fi
          else
            echo "base=${{ env.DEFAULT_CNPG_BASE }}" >> $GITHUB_OUTPUT
          fi

      - name: Show build information
        run: |
          echo "Building CNPG Postgres Plus image"
          echo "CNPG base image: ${{ steps.cnpg_base.outputs.base }}"
          echo "Image tag: ${IMAGE_TAG}"
          make show-info \
            DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            IMAGE_TAG=${IMAGE_TAG}

      # only trigger scheduled weekly build if the CNPG image changed
      - name: Check if base image changed (schedule only)
        if: github.event_name == 'schedule'
        id: check-base
        run: |
          if make check-base-updated \
            DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            IMAGE_TAG=latest; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # for any other build it does not matter if the base changed or not
      - name: Build and test image
        if: github.event_name != 'schedule'
        run: |
          make build-and-test \
            DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            IMAGE_TAG=${IMAGE_TAG}

      # build for scheduled runs only if base changed
      - name: Build and test image (schedule)
        if: github.event_name == 'schedule' && steps.check-base.outputs.changed == 'true'
        run: |
          make build-and-test \
            DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            IMAGE_TAG=latest

      # only run snyk if it is not a scheduled run or, for scheduled runs, if something changed and we had to actually build the image
      - name: Run Snyk to check Docker image for vulnerabilities
        if: github.event_name != 'schedule' || steps.check-base.outputs.changed == 'true'
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.event_name == 'schedule' && 'latest' || env.IMAGE_TAG }}
          args: --severity-threshold=high --file=${{ env.DOCKERFILE_DIR }}/Dockerfile --sarif-file-output=snyk.sarif

      - name: Upload Snyk SARIF to Code Scanning
        if: github.event_name != 'schedule' || steps.check-base.outputs.changed == 'true'
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: snyk.sarif

      # PRs (same-repo only): push **sha** tag (multi-arch). No latest / 17.5 / 17.5-date.
      # PRs from forks - don't push
      - name: Push multiarch image (PRs → sha only)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        run: |
          docker buildx build \
            --platform "${PLATFORMS}" \
            -f "${DOCKERFILE_DIR}/Dockerfile" \
            -t "ghcr.io/${IMAGE_NAME}:${{ github.sha }}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.description=CNPG PostgreSQL image (PR build)" \
            --label "org.opencontainers.image.licenses=PostgreSQL" \
            --build-arg CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            --push \
            .

      # Main pushes and manual runs: (full tags, IMAGE_TAG=latest)
      - name: Push multiarch image (full tags)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          make push-multiarch \
            DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            IMAGE_TAG=${IMAGE_TAG}

      # Scheduled run: run only if base changed (full tags, IMAGE_TAG=latest)
      - name: Push multiarch image for scheduled build
        if: github.event_name == 'schedule' && steps.check-base.outputs.changed == 'true'
        run: |
          make push-multiarch \
            DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            IMAGE_TAG=latest

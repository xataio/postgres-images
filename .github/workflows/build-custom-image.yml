name: Build CNPG Postgres Plus Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      cnpg_base:
        description: 'CNPG base image'
        required: true
        default: 'minimal'
        type: choice
        options:
          - 'standard'
          - 'minimal'
      custom_cnpg_base:
        description: 'Custom CNPG base image (optional - overrides the choice above)'
        required: false
        type: string
  schedule:
    - cron: '0 2 * * 3' # Every Wednesday at 2 AM UTC

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - pg: 17
            base_minimal: ghcr.io/cloudnative-pg/postgresql:17-minimal-bookworm
            base_standard: ghcr.io/cloudnative-pg/postgresql:17-standard-bookworm
            default_base: ghcr.io/cloudnative-pg/postgresql:17-minimal-bookworm
            sha_suffix: ""          # bare <sha> for PG17
          - pg: 18
            base_minimal: ghcr.io/cloudnative-pg/postgresql:18rc1-minimal-bookworm
            base_standard: ghcr.io/cloudnative-pg/postgresql:18rc1-standard-bookworm
            default_base: ghcr.io/cloudnative-pg/postgresql:18rc1-minimal-bookworm
            sha_suffix: "-pg18"     # avoid <sha> collision for PG18
    env:
      REGISTRY: ghcr.io
      PLATFORMS: linux/amd64,linux/arm64
      IMAGE_NAME: xataio/postgres-images/cnpg-postgres-plus
      DOCKERFILE_DIR: docker/custom-postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine CNPG base image
        id: cnpg_base
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ github.event.inputs.custom_cnpg_base }}" ]]; then
              echo "base=${{ github.event.inputs.custom_cnpg_base }}" >> $GITHUB_OUTPUT
            elif [[ "${{ github.event.inputs.cnpg_base }}" == "minimal" ]]; then
              echo "base=${{ matrix.base_minimal }}" >> $GITHUB_OUTPUT
            else
              echo "base=${{ matrix.base_standard }}" >> $GITHUB_OUTPUT
            fi
          else
            echo "base=${{ matrix.default_base }}" >> $GITHUB_OUTPUT
          fi

      - name: Compute tags (per row)
        id: tags
        run: |
          DATE=$(date -u +%Y%m%d)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}${{ matrix.sha_suffix }}" >> $GITHUB_OUTPUT

      - name: Show build information
        run: |
          echo "Building CNPG Postgres Plus image"
          echo "PG major: ${{ matrix.pg }}"
          echo "CNPG base image: ${{ steps.cnpg_base.outputs.base }}"
          echo "IMAGE_TAG for this row: ${{ steps.tags.outputs.image_tag }}"
          make show-info \
            DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            PG_MAJOR=${{ matrix.pg }} \
            IMAGE_TAG=${{ steps.tags.outputs.image_tag }}

      # only trigger scheduled weekly build if the CNPG image changed
      - name: Check if base image changed (schedule only)
        if: github.event_name == 'schedule'
        id: check-base
        run: |
          if make check-base-updated \
            DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            PG_MAJOR=${{ matrix.pg }}; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # Build & test
      - name: Build and test image
        if: github.event_name != 'schedule'
        run: |
          make build-and-test \
            DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            PG_MAJOR=${{ matrix.pg }} \
            IMAGE_TAG=${{ steps.tags.outputs.image_tag }}

      # Build & test (schedule, only if base changed)
      - name: Build and test image (schedule)
        if: github.event_name == 'schedule' && steps.check-base.outputs.changed == 'true'
        run: |
          make build-and-test \
            DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            PG_MAJOR=${{ matrix.pg }} \
            IMAGE_TAG=${{ steps.tags.outputs.image_tag }}

      # only run snyk if it is not a scheduled run or, for scheduled runs, if something changed and we had to actually build the image
      - name: Run Snyk to check Docker image for vulnerabilities
        if: github.event_name != 'schedule' || steps.check-base.outputs.changed == 'true'
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.image_tag }}
          args: --severity-threshold=high --file=${{ env.DOCKERFILE_DIR }}/Dockerfile --sarif-file-output=snyk.sarif

      - name: Upload Snyk SARIF to Code Scanning
        if: github.event_name != 'schedule' || steps.check-base.outputs.changed == 'true'
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: snyk.sarif

      # PRs (same-repo only): push SHA tag(s) only (no version/date tags)
      - name: Push multiarch image (PRs → sha only)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        run: |
          docker buildx build \
            --platform "${PLATFORMS}" \
            -f "${DOCKERFILE_DIR}/Dockerfile" \
            -t "ghcr.io/${IMAGE_NAME}:${{ steps.tags.outputs.image_tag }}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.description=CNPG PostgreSQL image (PR build PG${{ matrix.pg }})" \
            --label "org.opencontainers.image.licenses=PostgreSQL" \
            --build-arg CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            --build-arg PG_MAJOR=${{ matrix.pg }} \
            --push \
            .

      # Main pushes & manual runs: push full tag set (version + date + sha[-pg18])
      - name: Push multiarch image (full tags)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          make push-multiarch \
            DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            PG_MAJOR=${{ matrix.pg }} \
            IMAGE_TAG=${{ steps.tags.outputs.image_tag }}

      # Scheduled run: push only if base changed
      - name: Push multiarch image for scheduled build
        if: github.event_name == 'schedule' && steps.check-base.outputs.changed == 'true'
        run: |
          make push-multiarch \
            DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            CNPG_BASE="${{ steps.cnpg_base.outputs.base }}" \
            PG_MAJOR=${{ matrix.pg }} \
            IMAGE_TAG=${{ steps.tags.outputs.image_tag }}

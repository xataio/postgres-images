name: Build Custom CNPG Postgres 17 Image

on:
  push:
    branches: [main, add-makefile]
  workflow_dispatch:
  schedule:
    # Run every Wednesday at 2 AM UTC
    - cron: '0 2 * * 3'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: xataio/postgres-images/cnpg-postgres-plus
  CNPG_BASE: ghcr.io/cloudnative-pg/postgresql:17-minimal-bookworm

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show build information
        run: make show-info

      - name: Build and test (always for push/manual)
        if: github.event_name != 'schedule'
        run: |
          make build-and-test
          make push-multiarch

      - name: Conditional build for scheduled runs
        if: github.event_name == 'schedule'
        run: make ci-build
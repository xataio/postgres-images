name: Build Multiple CNPG Postgres Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run every Wednesday at 2 AM UTC
    - cron: '0 2 * * 3'

jobs:
  # Summary job that requires all matrix jobs to complete successfully
  build-test-publish:
    runs-on: ubuntu-latest
    needs: build-test-publish-matrix
    if: always()
    steps:
      - name: Check matrix job results
        run: |
          if [[ "${{ needs.build-test-publish-matrix.result }}" == "success" ]]; then
            echo "All matrix jobs completed successfully"
          else
            echo "One or more matrix jobs failed"
            exit 1
          fi

  build-test-publish-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - name: "analytics"
            dockerfile_dir: "docker/analytics"
            image_name: "xataio/postgres-images/cnpg-postgres-analytics"
            cnpg_base: "ghcr.io/cloudnative-pg/postgresql:17-standard-bookworm"
          - name: "full_extensions"
            dockerfile_dir: "docker/custom-postgres"
            image_name: "xataio/postgres-images/cnpg-postgres-plus"
            cnpg_base: "ghcr.io/cloudnative-pg/postgresql:17-minimal-bookworm"
          - name: "postgis"
            dockerfile_dir: "docker/postgis"
            image_name: "xataio/postgres-images/cnpg-postgres-postgis"
            cnpg_base: "ghcr.io/cloudnative-pg/postgresql:17-standard-bookworm"

    env:
      REGISTRY: ghcr.io
      PLATFORMS: linux/amd64,linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show build information for ${{ matrix.config.name }}
        run: |
          echo "Building configuration: ${{ matrix.config.name }}"
          make show-info \
            DOCKERFILE_DIR="${{ matrix.config.dockerfile_dir }}" \
            IMAGE_NAME="${{ matrix.config.image_name }}" \
            CNPG_BASE="${{ matrix.config.cnpg_base }}"

      - name: Build and test ${{ matrix.config.name }} (always for push/manual)
        if: github.event_name != 'schedule'
        run: |
          make build-and-test \
            DOCKERFILE_DIR="${{ matrix.config.dockerfile_dir }}" \
            IMAGE_NAME="${{ matrix.config.image_name }}" \
            CNPG_BASE="${{ matrix.config.cnpg_base }}"
          make push-multiarch \
            DOCKERFILE_DIR="${{ matrix.config.dockerfile_dir }}" \
            IMAGE_NAME="${{ matrix.config.image_name }}" \
            CNPG_BASE="${{ matrix.config.cnpg_base }}"

      - name: Conditional build for ${{ matrix.config.name }} (scheduled runs)
        if: github.event_name == 'schedule'
        run: |
          make ci-build \
            DOCKERFILE_DIR="${{ matrix.config.dockerfile_dir }}" \
            IMAGE_NAME="${{ matrix.config.image_name }}" \
            CNPG_BASE="${{ matrix.config.cnpg_base }}"
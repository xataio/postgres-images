name: Build CNPG Postgres Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      cnpg_base:
        description: 'CNPG base image'
        required: true
        default: 'minimal'
        type: choice
        options:
          - 'standard'
          - 'minimal'
      custom_cnpg_base:
        description: 'Custom CNPG base image (optional)'
        required: false
        type: string
      target_folder:
        description: 'Target Docker folder (optional - builds all if empty)'
        required: false
        type: choice
        options:
          - ''
          - 'docker/custom-postgres'
          - 'docker/experimental'
  schedule:
    - cron: '0 2 * * 3' # Every Wednesday at 2 AM UTC

jobs:
  # Detect which folders to build
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Docker folders
        id: set-matrix
        run: |
          # Define folder configurations
          declare -A folders=(
            ["docker/custom-postgres"]='{"pg_versions":[17,18],"image_name":"xataio/postgres-images/cnpg-postgres-plus","description":"CNPG PostgreSQL with additional extensions"}'
            ["docker/experimental"]='{"pg_versions":[17],"image_name":"xataio/postgres-images/experimental","description":"My custom PostgreSQL experimental"}'
          )
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ github.event.inputs.target_folder }}" ]]; then
              # Manual trigger with specific folder
              folder="${{ github.event.inputs.target_folder }}"
              config="${folders[$folder]}"
              matrix="{\"include\":[{\"folder\":\"$folder\",\"config\":$config}]}"
            else
              # Manual trigger - build all folders
              matrix='{"include":['
              for folder in "${!folders[@]}"; do
                config="${folders[$folder]}"
                matrix+="{\"folder\":\"$folder\",\"config\":$config},"
              done
              matrix="${matrix%,}]}"
            fi
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            # Scheduled - build all folders
            matrix='{"include":['
            for folder in "${!folders[@]}"; do
              config="${folders[$folder]}"
              matrix+="{\"folder\":\"$folder\",\"config\":$config},"
            done
            matrix="${matrix%,}]}"
          else
            # Push/PR - detect changed folders
            changed_folders=()
            for folder in "${!folders[@]}"; do
              if git diff --name-only HEAD~1 HEAD | grep -q "^$folder/"; then
                changed_folders+=("$folder")
              fi
            done
          
            if [[ ${#changed_folders[@]} -eq 0 ]]; then
              # No docker folders changed, build all (fallback)
              matrix='{"include":['
              for folder in "${!folders[@]}"; do
                config="${folders[$folder]}"
                matrix+="{\"folder\":\"$folder\",\"config\":$config},"
              done
              matrix="${matrix%,}]}"
            else
              # Build only changed folders
              matrix='{"include":['
              for folder in "${changed_folders[@]}"; do
                config="${folders[$folder]}"
                matrix+="{\"folder\":\"$folder\",\"config\":$config},"
              done
              matrix="${matrix%,}]}"
            fi
          fi
          
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Generated matrix: $matrix"

  # Summary job
  build-test-publish:
    name: build-test-publish
    runs-on: ubuntu-latest
    needs: [build-test-publish-matrix]
    if: always()
    steps:
      - name: Check matrix job results
        run: |
          results="${{ join(needs.*.result, ',') }}"
          echo "Matrix job results: $results"
          if [[ "$results" == *failure* || "$results" == *cancelled* ]]; then
            echo "One or more matrix jobs failed"
            exit 1
          fi
          echo "All matrix jobs completed successfully"

  build-test-publish-matrix:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    env:
      REGISTRY: ghcr.io
      PLATFORMS: linux/amd64,linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Test organization token access
      - name: Test organization token access
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          echo "Testing GIT_TOKEN access to xataio/xata-utils..."
          
          # Test repository access
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/xataio/xata-utils)
          
          echo "Repository access response: $response"
          
          if [ "$response" = "200" ]; then
            echo "Repository accessible"
          
            # Test the specific release
            echo "Testing release v0.0.0-test..."
            release_response=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                 -H "Accept: application/vnd.github.v3+json" \
                 https://api.github.com/repos/xataio/xata-utils/releases/tags/v0.0.0-test)
          
            if echo "$release_response" | jq -e '.tag_name' >/dev/null 2>&1; then
              echo "Release v0.0.0-test found"
            else
              echo "Release v0.0.0-test not found"
              echo "Available releases:"
              curl -s -H "Authorization: token $GITHUB_TOKEN" \
                   -H "Accept: application/vnd.github.v3+json" \
                   https://api.github.com/repos/xataio/xata-utils/releases \
              | jq -r '.[].tag_name' | head -5
            fi
          else
            echo "Repository not accessible (HTTP $response)"
            exit 1
          fi

      - name: Set environment variables
        run: |
          # Parse matrix config
          pg_versions='${{ toJSON(matrix.config.pg_versions) }}'
          image_name='${{ matrix.config.image_name }}'
          description='${{ matrix.config.description }}'
          
          echo "IMAGE_NAME=${image_name}" >> $GITHUB_ENV
          echo "DOCKERFILE_DIR=${{ matrix.folder }}" >> $GITHUB_ENV
          echo "DESCRIPTION=${description}" >> $GITHUB_ENV

      # Create a sub-matrix for PG versions
      # Build each PG version for this folder
      - name: Build and process PG versions
        run: |
          # Get PG versions for this folder
          pg_versions='${{ toJSON(matrix.config.pg_versions) }}'
          echo "Building PG versions: $pg_versions for folder: ${{ matrix.folder }}"
          
          # Process each PG version
          for pg_major in $(echo "$pg_versions" | jq -r '.[]'); do
            echo "=== Processing PG ${pg_major} ==="
          
            # Set version-specific variables
            if [[ "$pg_major" == "17" ]]; then
              base_minimal="ghcr.io/cloudnative-pg/postgresql:17-minimal-bookworm"
              base_standard="ghcr.io/cloudnative-pg/postgresql:17-standard-bookworm"
              default_base="ghcr.io/cloudnative-pg/postgresql:17-minimal-bookworm"
              sha_suffix=""
            else
              base_minimal="ghcr.io/cloudnative-pg/postgresql:18rc1-minimal-bookworm"
              base_standard="ghcr.io/cloudnative-pg/postgresql:18rc1-standard-bookworm"  
              default_base="ghcr.io/cloudnative-pg/postgresql:18rc1-minimal-bookworm"
              sha_suffix="-pg18"
            fi
          
            # Determine CNPG base image
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              if [[ -n "${{ github.event.inputs.custom_cnpg_base }}" ]]; then
                cnpg_base="${{ github.event.inputs.custom_cnpg_base }}"
              elif [[ "${{ github.event.inputs.cnpg_base }}" == "minimal" ]]; then
                cnpg_base="$base_minimal"
              else
                cnpg_base="$base_standard"
              fi
            else
              cnpg_base="$default_base"
            fi
          
            # Create image tag
            image_tag="${{ github.sha }}${sha_suffix}"
          
            echo "CNPG Base: $cnpg_base"
            echo "Image Tag: $image_tag"
            echo "Folder: ${{ matrix.folder }}"
          
            # Show build info using make (with organization token)
            GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make show-info \
              DOCKERFILE_DIR="${{ env.DOCKERFILE_DIR }}" \
              IMAGE_NAME="${{ env.IMAGE_NAME }}" \
              CNPG_BASE="$cnpg_base" \
              PG_MAJOR="$pg_major" \
              IMAGE_TAG="$image_tag"
          
            # For scheduled builds, check if base image changed
            should_build=true
            if [[ "${{ github.event_name }}" == "schedule" ]]; then
              if ! GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make check-base-updated \
                DOCKERFILE_DIR="${{ env.DOCKERFILE_DIR }}" \
                IMAGE_NAME="${{ env.IMAGE_NAME }}" \
                CNPG_BASE="$cnpg_base" \
                PG_MAJOR="$pg_major"; then
                echo "Base image unchanged for PG${pg_major}, skipping build..."
                should_build=false
              fi
            fi
          
            if [[ "$should_build" == "true" ]]; then
              # Build and test using make with organization token
              echo "Building and testing PG${pg_major}..."
              GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make build-and-test \
                DOCKERFILE_DIR="${{ env.DOCKERFILE_DIR }}" \
                IMAGE_NAME="${{ env.IMAGE_NAME }}" \
                CNPG_BASE="$cnpg_base" \
                PG_MAJOR="$pg_major" \
                IMAGE_TAG="$image_tag"
            fi
          
            # Export variables for next steps
            echo "PG${pg_major}_CNPG_BASE=$cnpg_base" >> $GITHUB_ENV
            echo "PG${pg_major}_IMAGE_TAG=$image_tag" >> $GITHUB_ENV
            echo "PG${pg_major}_SHOULD_BUILD=$should_build" >> $GITHUB_ENV
          done

      # Run Snyk scan for built images
      - name: Run Snyk scans
        if: github.event_name != 'schedule' || env.PG17_SHOULD_BUILD == 'true' || env.PG18_SHOULD_BUILD == 'true'
        continue-on-error: true
        run: |
          pg_versions='${{ toJSON(matrix.config.pg_versions) }}'
          for pg_major in $(echo "$pg_versions" | jq -r '.[]'); do
            should_build_var="PG${pg_major}_SHOULD_BUILD"
            image_tag_var="PG${pg_major}_IMAGE_TAG"
          
            if [[ "${!should_build_var}" == "true" ]]; then
              echo "Running Snyk scan for PG${pg_major}..."
              if command -v snyk >/dev/null 2>&1; then
                snyk container test "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${!image_tag_var}" \
                  --severity-threshold=high \
                  --file="${{ env.DOCKERFILE_DIR }}/Dockerfile" \
                  --sarif-file-output="snyk-pg${pg_major}.sarif" || true
              else
                echo "Snyk not available, skipping scan for PG${pg_major}"
              fi
            fi
          done
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Push images based on trigger type
      - name: Push images
        run: |
          pg_versions='${{ toJSON(matrix.config.pg_versions) }}'
          
          for pg_major in $(echo "$pg_versions" | jq -r '.[]'); do
            should_build_var="PG${pg_major}_SHOULD_BUILD"
            cnpg_base_var="PG${pg_major}_CNPG_BASE"
            image_tag_var="PG${pg_major}_IMAGE_TAG"
          
            if [[ "${!should_build_var}" == "true" ]]; then
              echo "Pushing PG${pg_major} image..."
          
              # Test GitHub token access before pushing
              echo "Testing GitHub token access before push..."
              GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make test-github-access \
                DOCKERFILE_DIR="${{ env.DOCKERFILE_DIR }}" \
                IMAGE_NAME="${{ env.IMAGE_NAME }}"
          
              if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.fork }}" == "false" ]]; then
                # PR builds - SHA tag only using Docker secrets with organization token (matching Makefile pattern)
                GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}"
                echo "$GITHUB_TOKEN" | docker buildx build \
                  --platform "${{ env.PLATFORMS }}" \
                  -f "${{ env.DOCKERFILE_DIR }}/Dockerfile" \
                  -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${!image_tag_var}" \
                  --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
                  --label "org.opencontainers.image.description=${{ env.DESCRIPTION }} (PR build PG${pg_major})" \
                  --label "org.opencontainers.image.licenses=PostgreSQL" \
                  --build-arg CNPG_BASE="${!cnpg_base_var}" \
                  --build-arg PG_MAJOR="$pg_major" \
                  --secret id=github_token,src=/dev/stdin \
                  --push \
                  .
              elif [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "schedule" ]]; then
                # Full builds - all tags using make with organization token
                GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make push-multiarch \
                  DOCKERFILE_DIR="${{ env.DOCKERFILE_DIR }}" \
                  IMAGE_NAME="${{ env.IMAGE_NAME }}" \
                  CNPG_BASE="${!cnpg_base_var}" \
                  PG_MAJOR="$pg_major" \
                  IMAGE_TAG="${!image_tag_var}"
              fi
            else
              echo "Skipping push for PG${pg_major} (not built)"
            fi
          done
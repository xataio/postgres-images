name: Build CNPG Postgres Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      cnpg_base:
        description: 'CNPG base image'
        required: true
        default: 'minimal'
        type: choice
        options:
          - 'standard'
          - 'minimal'
      custom_cnpg_base:
        description: 'Custom CNPG base image (optional)'
        required: false
        type: string
      target_folder:
        description: 'Target Docker folder (optional - builds all if empty)'
        required: false
        type: choice
        options:
          - ''
          - 'docker/custom-postgres'
          - 'docker/experimental'
          - 'docker/analytics'
          - 'docker/minimal'
      only_version:
        description: 'Limit build to a single PG version (optional)'
        required: false
        type: string
  schedule:
    - cron: '0 2 * * 3' # Every Wednesday at 2 AM UTC

jobs:
  # Detect which folders to build
  detect-changes:
    runs-on: ubuntu-latest
    env:
      INPUT_TARGET_FOLDER: ${{ github.event.inputs.target_folder }}
      INPUT_ONLY_VERSION: ${{ github.event.inputs.only_version }}
      INPUT_CUSTOM_CNPG_BASE: ${{ github.event.inputs.custom_cnpg_base }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect changed Docker folders
        id: set-matrix
        run: |
          # Define folder configurations
          declare -A folders=(
            ["docker/custom-postgres"]='{"pg_versions":[17,18,14,15,16],"image_name":"xataio/postgres-images/cnpg-postgres-plus","description":"CNPG PostgreSQL with additional extensions"}'
            ["docker/experimental"]='{"pg_versions":[17,18,16],"image_name":"xataio/postgres-images/experimental","description":"My custom PostgreSQL experimental"}'
            ["docker/analytics"]='{"pg_versions":[17,18],"image_name":"xataio/postgres-images/xata-analytics","description":"CNPG PostgreSQL plus with added pg_duckdb"}'
            ["docker/minimal"]='{"pg_versions":[17],"image_name":"xataio/postgres-images/minimal","description":"Minimal PostgreSQL 17 with xatautils and pgbackrest"}'
          )
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${INPUT_TARGET_FOLDER}" ]]; then
              # Manual trigger with specific folder
              folder="${INPUT_TARGET_FOLDER}"
              config="${folders[$folder]}"
              matrix="{\"include\":[{\"folder\":\"$folder\",\"config\":$config}]}"
            else
              # Manual trigger - build all folders
              matrix='{"include":['
              for folder in "${!folders[@]}"; do
                config="${folders[$folder]}"
                matrix+="{\"folder\":\"$folder\",\"config\":$config},"
              done
              matrix="${matrix%,}]}"
            fi

            # Narrow to a single major if requested
            if [[ -n "${INPUT_ONLY_VERSION}" ]]; then
              input_version="${INPUT_ONLY_VERSION}"

              # Extract major version (e.g., "17" from "17.5" or "17")
              major_version="${input_version%%.*}"
              matrix=$(jq \
                --arg major "$major_version" '
                  .include |= map(
                    . as $item
                    | if $major == "" then $item
                      else ($item.config.pg_versions = [($major|tonumber)]) end
                  )
                ' <<<"$matrix")
            fi

            # Safety guard: if a custom base is provided, require only_version
            if [[ -n "${INPUT_CUSTOM_CNPG_BASE}" && -z "${INPUT_ONLY_VERSION}" ]]; then
              echo "ERROR: custom_cnpg_base was provided but only_version was not set. Refusing to build cross-major with a single custom base."
              exit 1
            fi

          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            # Scheduled - build all folders
            matrix='{"include":['
            for folder in "${!folders[@]}"; do
              config="${folders[$folder]}"
              matrix+="{\"folder\":\"$folder\",\"config\":$config},"
            done
            matrix="${matrix%,}]}"
          else
            # Push/PR - detect changed folders
            changed_folders=()
            for folder in "${!folders[@]}"; do
              if git diff --name-only HEAD~1 HEAD | grep -q "^$folder/"; then
                changed_folders+=("$folder")
              fi
            done
          
            if [[ ${#changed_folders[@]} -eq 0 ]]; then
              # No docker folders changed, build all (fallback)
              matrix='{"include":['
              for folder in "${!folders[@]}"; do
                config="${folders[$folder]}"
                matrix+="{\"folder\":\"$folder\",\"config\":$config},"
              done
              matrix="${matrix%,}]}"
            else
              # Build only changed folders
              matrix='{"include":['
              for folder in "${changed_folders[@]}"; do
                config="${folders[$folder]}"
                matrix+="{\"folder\":\"$folder\",\"config\":$config},"
              done
              matrix="${matrix%,}]}"
            fi
          fi
          matrix="$(jq -c . <<<"$matrix")"
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Generated matrix: $matrix"

  # Build AMD64 images
  build-test-publish-amd64:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    env:
      REGISTRY: ghcr.io
      PLATFORMS: linux/amd64
      ARCH: amd64
      INPUT_ONLY_VERSION: ${{ github.event.inputs.only_version }}
      INPUT_CUSTOM_CNPG_BASE: ${{ github.event.inputs.custom_cnpg_base }}
      INPUT_CNPG_BASE: ${{ github.event.inputs.cnpg_base }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Test organization token access
      - name: Test organization token access
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          echo "Testing GIT_TOKEN access to xataio/xata-utils..."
          
          # Test repository access
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/xataio/xata-utils)
          
          echo "Repository access response: $response"
          
          if [ "$response" = "200" ]; then
            echo "Repository accessible"
          
            # Test the specific release
            echo "Testing release v0.2.0..."
            release_response=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                 -H "Accept: application/vnd.github.v3+json" \
                 https://api.github.com/repos/xataio/xata-utils/releases/tags/v0.2.0)
          
            if echo "$release_response" | jq -e '.tag_name' >/dev/null 2>&1; then
              echo "Release v0.2.0 found"
            else
              echo "Release v0.2.0 not found"
              echo "Available releases:"
              curl -s -H "Authorization: token $GITHUB_TOKEN" \
                   -H "Accept: application/vnd.github.v3+json" \
                   https://api.github.com/repos/xataio/xata-utils/releases \
              | jq -r '.[].tag_name' | head -5
            fi
          else
            echo "Repository not accessible (HTTP $response)"
            exit 1
          fi

      - name: Set environment variables
        run: |
          # Parse input version if provided
          input_version="${INPUT_ONLY_VERSION}"
          if [[ -n "$input_version" && "$input_version" == *.* ]]; then
          # Contains dot, use as PG_DEV_VERSION with wildcard
            pg_dev_version="${input_version}-*"
          else
            pg_dev_version=""
          fi

          echo "PG_DEV_VERSION=$pg_dev_version" >> $GITHUB_ENV
          # Parse matrix config
          pg_versions='${{ toJSON(matrix.config.pg_versions) }}'
          image_name='${{ matrix.config.image_name }}'
          description='${{ matrix.config.description }}'

          echo "IMAGE_NAME=${image_name}" >> $GITHUB_ENV
          echo "DOCKERFILE_DIR=${{ matrix.folder }}" >> $GITHUB_ENV
          echo "DESCRIPTION=${description}" >> $GITHUB_ENV

      # Build each PG version for this folder
      - name: Build and process PG versions
        run: |
          # Get PG versions for this folder
          pg_versions='${{ toJSON(matrix.config.pg_versions) }}'
          echo "Building PG versions: $pg_versions for folder: ${{ matrix.folder }} (AMD64)"

          # Process each PG version
          for pg_major in $(echo "$pg_versions" | jq -r '.[]'); do
            echo "=== Processing PG ${pg_major} (AMD64) ==="

            # Set version-specific variables
          case "$pg_major" in
          14)
            base_minimal="ghcr.io/cloudnative-pg/postgresql:14-minimal-bookworm"
            base_standard="ghcr.io/cloudnative-pg/postgresql:14-standard-bookworm"
            default_base="$base_minimal"
            sha_suffix="-pg14-${ARCH}"
            ;;
          15)
            base_minimal="ghcr.io/cloudnative-pg/postgresql:15-minimal-bookworm"
            base_standard="ghcr.io/cloudnative-pg/postgresql:15-standard-bookworm"
            default_base="$base_minimal"
            sha_suffix="-pg15-${ARCH}"
            ;;
          16)
            base_minimal="ghcr.io/cloudnative-pg/postgresql:16-minimal-bookworm"
            base_standard="ghcr.io/cloudnative-pg/postgresql:16-standard-bookworm"
            default_base="$base_minimal"
            sha_suffix="-pg16-${ARCH}"
            ;;
          17)
            base_minimal="ghcr.io/cloudnative-pg/postgresql:17-minimal-bookworm"
            base_standard="ghcr.io/cloudnative-pg/postgresql:17-standard-bookworm"
            default_base="$base_minimal"
            sha_suffix="-pg17-${ARCH}"
            ;;
          18)
            base_minimal="ghcr.io/cloudnative-pg/postgresql:18-minimal-bookworm"
            base_standard="ghcr.io/cloudnative-pg/postgresql:18-standard-bookworm"
            default_base="$base_minimal"
            sha_suffix="-pg18-${ARCH}"
            ;;
          *)
            echo "Unsupported PG version: $pg_major"
            exit 1
            ;;
          esac

            # Determine CNPG base image
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              if [[ -n "${INPUT_CUSTOM_CNPG_BASE}" ]]; then
                cnpg_base="${INPUT_CUSTOM_CNPG_BASE}"
              elif [[ "${INPUT_CNPG_BASE}" == "minimal" ]]; then
                cnpg_base="$base_minimal"
              else
                cnpg_base="$base_standard"
              fi
            else
              cnpg_base="$default_base"
            fi

            # Create image tag
            image_tag="${{ github.sha }}${sha_suffix}"

            echo "CNPG Base: $cnpg_base"
            echo "Image Tag: $image_tag"
            echo "Folder: ${{ matrix.folder }}"

            # Show build info using make (with organization token)
            GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make show-info \
              DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
              IMAGE_NAME="${IMAGE_NAME}" \
              CNPG_BASE="$cnpg_base" \
              PG_MAJOR="$pg_major" \
              IMAGE_TAG="$image_tag" \
              PG_DEV_VERSION="${PG_DEV_VERSION}"

            # For scheduled builds, check if base image changed
            should_build=true
            if [[ "${{ github.event_name }}" == "schedule" ]]; then
              if ! GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make check-base-updated \
                DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
                IMAGE_NAME="${IMAGE_NAME}" \
                CNPG_BASE="$cnpg_base" \
                PG_MAJOR="$pg_major"; then
                echo "Base image unchanged for PG${pg_major}, skipping build..."
                should_build=false
              fi
            fi

            if [[ "$should_build" == "true" ]]; then
              # Build and test using make with organization token
              echo "Building and testing PG${pg_major} (AMD64)..."
              GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make build-and-test \
                DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
                IMAGE_NAME="${IMAGE_NAME}" \
                CNPG_BASE="$cnpg_base" \
                PG_MAJOR="$pg_major" \
                IMAGE_TAG="$image_tag" \
                PLATFORM="linux/amd64" \
                PG_DEV_VERSION="${PG_DEV_VERSION}"
            fi

            # Export variables for next steps
            echo "PG${pg_major}_CNPG_BASE=$cnpg_base" >> $GITHUB_ENV
            echo "PG${pg_major}_IMAGE_TAG=$image_tag" >> $GITHUB_ENV
            echo "PG${pg_major}_SHOULD_BUILD=$should_build" >> $GITHUB_ENV
          done

      # Push AMD64 images
      - name: Push images
        run: |
          pg_versions='${{ toJSON(matrix.config.pg_versions) }}'
          for pg_major in $(echo "$pg_versions" | jq -r '.[]'); do
            should_build_var="PG${pg_major}_SHOULD_BUILD"
            cnpg_base_var="PG${pg_major}_CNPG_BASE"
            image_tag_var="PG${pg_major}_IMAGE_TAG"

            if [[ "${!should_build_var}" == "true" ]]; then
              echo "Pushing PG${pg_major} image (AMD64)..."

              # Test GitHub token access before pushing
              echo "Testing GitHub token access before push..."
              GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make test-github-access \
                DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
                IMAGE_NAME="${IMAGE_NAME}"

              GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make push-arch \
              DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
              IMAGE_NAME="${IMAGE_NAME}" \
              CNPG_BASE="${!cnpg_base_var}" \
              PG_MAJOR="$pg_major" \
              IMAGE_TAG="${!image_tag_var}" \
              PLATFORMS="${PLATFORMS}"
            else
              echo "Skipping push for PG${pg_major} (not built)"
            fi
          done

  # Build ARM64 images
  build-test-publish-arm64:
    runs-on:
      group: arm-runners
    needs: detect-changes
    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    env:
      REGISTRY: ghcr.io
      PLATFORMS: linux/arm64
      ARCH: arm64
      INPUT_ONLY_VERSION: ${{ github.event.inputs.only_version }}
      INPUT_CUSTOM_CNPG_BASE: ${{ github.event.inputs.custom_cnpg_base }}
      INPUT_CNPG_BASE: ${{ github.event.inputs.cnpg_base }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Test organization token access
      - name: Test organization token access
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          echo "Testing GIT_TOKEN access to xataio/xata-utils..."
          
          # Test repository access
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/xataio/xata-utils)
          
          echo "Repository access response: $response"
          
          if [ "$response" = "200" ]; then
            echo "Repository accessible"
          
            # Test the specific release
            echo "Testing release v0.2.0..."
            release_response=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                 -H "Accept: application/vnd.github.v3+json" \
                 https://api.github.com/repos/xataio/xata-utils/releases/tags/v0.2.0)
          
            if echo "$release_response" | jq -e '.tag_name' >/dev/null 2>&1; then
              echo "Release v0.2.0 found"
            else
              echo "Release v0.2.0 not found"
              echo "Available releases:"
              curl -s -H "Authorization: token $GITHUB_TOKEN" \
                   -H "Accept: application/vnd.github.v3+json" \
                   https://api.github.com/repos/xataio/xata-utils/releases \
              | jq -r '.[].tag_name' | head -5
            fi
          else
            echo "Repository not accessible (HTTP $response)"
            exit 1
          fi

      - name: Set environment variables
        run: |
          # Parse input version if provided
          input_version="${INPUT_ONLY_VERSION}"
          if [[ -n "$input_version" && "$input_version" == *.* ]]; then
          # Contains dot, use as PG_DEV_VERSION with wildcard
          pg_dev_version="${input_version}-*"
          else
          pg_dev_version=""
          fi

          echo "PG_DEV_VERSION=$pg_dev_version" >> $GITHUB_ENV
          # Parse matrix config
          pg_versions='${{ toJSON(matrix.config.pg_versions) }}'
          image_name='${{ matrix.config.image_name }}'
          description='${{ matrix.config.description }}'

          echo "IMAGE_NAME=${image_name}" >> $GITHUB_ENV
          echo "DOCKERFILE_DIR=${{ matrix.folder }}" >> $GITHUB_ENV
          echo "DESCRIPTION=${description}" >> $GITHUB_ENV

      # Build each PG version for this folder
      - name: Build and process PG versions
        run: |
          # Get PG versions for this folder
          pg_versions='${{ toJSON(matrix.config.pg_versions) }}'
          echo "Building PG versions: $pg_versions for folder: ${{ matrix.folder }} (ARM64)"

          # Process each PG version
          for pg_major in $(echo "$pg_versions" | jq -r '.[]'); do
            echo "=== Processing PG ${pg_major} (ARM64) ==="

            # Set version-specific variables
            case "$pg_major" in
            14)
              base_minimal="ghcr.io/cloudnative-pg/postgresql:14-minimal-bookworm"
              base_standard="ghcr.io/cloudnative-pg/postgresql:14-standard-bookworm"
              default_base="$base_minimal"
              sha_suffix="-pg14-${ARCH}"
              ;;
            15)
              base_minimal="ghcr.io/cloudnative-pg/postgresql:15-minimal-bookworm"
              base_standard="ghcr.io/cloudnative-pg/postgresql:15-standard-bookworm"
              default_base="$base_minimal"
              sha_suffix="-pg15-${ARCH}"
              ;;
            16)
              base_minimal="ghcr.io/cloudnative-pg/postgresql:16-minimal-bookworm"
              base_standard="ghcr.io/cloudnative-pg/postgresql:16-standard-bookworm"
              default_base="$base_minimal"
              sha_suffix="-pg16-${ARCH}"
              ;;
            17)
              base_minimal="ghcr.io/cloudnative-pg/postgresql:17-minimal-bookworm"
              base_standard="ghcr.io/cloudnative-pg/postgresql:17-standard-bookworm"
              default_base="$base_minimal"
              sha_suffix="-pg17-${ARCH}"
              ;;
            18)
              base_minimal="ghcr.io/cloudnative-pg/postgresql:18-minimal-bookworm"
              base_standard="ghcr.io/cloudnative-pg/postgresql:18-standard-bookworm"
              default_base="$base_minimal"
              sha_suffix="-pg18-${ARCH}"
              ;;
            *)
              echo "Unsupported PG version: $pg_major"
              exit 1
              ;;
            esac

            # Determine CNPG base image
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              if [[ -n "${INPUT_CUSTOM_CNPG_BASE}" ]]; then
                cnpg_base="${INPUT_CUSTOM_CNPG_BASE}"
              elif [[ "${INPUT_CNPG_BASE}" == "minimal" ]]; then
                cnpg_base="$base_minimal"
              else
                cnpg_base="$base_standard"
              fi
            else
              cnpg_base="$default_base"
            fi

            # Create image tag
            image_tag="${{ github.sha }}${sha_suffix}"

            echo "CNPG Base: $cnpg_base"
            echo "Image Tag: $image_tag"
            echo "Folder: ${{ matrix.folder }}"

            # Show build info using make (with organization token)
            GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make show-info \
              DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
              IMAGE_NAME="${IMAGE_NAME}" \
              CNPG_BASE="$cnpg_base" \
              PG_MAJOR="$pg_major" \
              IMAGE_TAG="$image_tag" \
              PG_DEV_VERSION="${PG_DEV_VERSION}"

            # For scheduled builds, check if base image changed
            should_build=true
            if [[ "${{ github.event_name }}" == "schedule" ]]; then
              if ! GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make check-base-updated \
                DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
                IMAGE_NAME="${IMAGE_NAME}" \
                CNPG_BASE="$cnpg_base" \
                PG_MAJOR="$pg_major"; then
                echo "Base image unchanged for PG${pg_major}, skipping build..."
                should_build=false
              fi
            fi

            if [[ "$should_build" == "true" ]]; then
              # Build and test using make with organization token
              echo "Building and testing PG${pg_major} (ARM64)..."
              GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make build-and-test \
                DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
                IMAGE_NAME="${IMAGE_NAME}" \
                CNPG_BASE="$cnpg_base" \
                PG_MAJOR="$pg_major" \
                IMAGE_TAG="$image_tag" \
                PLATFORM="linux/arm64" \
                PG_DEV_VERSION="${PG_DEV_VERSION}"
            fi

            # Export variables for next steps
            echo "PG${pg_major}_CNPG_BASE=$cnpg_base" >> $GITHUB_ENV
            echo "PG${pg_major}_IMAGE_TAG=$image_tag" >> $GITHUB_ENV
            echo "PG${pg_major}_SHOULD_BUILD=$should_build" >> $GITHUB_ENV
          done

      # Push ARM64 images
      - name: Push images
        run: |
          pg_versions='${{ toJSON(matrix.config.pg_versions) }}'

          for pg_major in $(echo "$pg_versions" | jq -r '.[]'); do
            should_build_var="PG${pg_major}_SHOULD_BUILD"
            cnpg_base_var="PG${pg_major}_CNPG_BASE"
            image_tag_var="PG${pg_major}_IMAGE_TAG"

            if [[ "${!should_build_var}" == "true" ]]; then
              echo "Pushing PG${pg_major} image (ARM64)..."

              # Test GitHub token access before pushing
              echo "Testing GitHub token access before push..."
              GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make test-github-access \
                DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
                IMAGE_NAME="${IMAGE_NAME}"

              GITHUB_TOKEN="${{ secrets.GIT_TOKEN }}" make push-arch \
              DOCKERFILE_DIR="${DOCKERFILE_DIR}" \
              IMAGE_NAME="${IMAGE_NAME}" \
              CNPG_BASE="${!cnpg_base_var}" \
              PG_MAJOR="$pg_major" \
              IMAGE_TAG="${!image_tag_var}" \
              PLATFORMS="${PLATFORMS}"
            else
              echo "Skipping push for PG${pg_major} (not built)"
            fi
          done

  # Create multiarch manifests (combine AMD64 and ARM64 images)
  create-manifest:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-test-publish-amd64, build-test-publish-arm64]
    if: github.event_name != 'pull_request'
    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx (for imagetools)
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Set environment variables
        run: |
          # Parse matrix config
          pg_versions='${{ toJSON(matrix.config.pg_versions) }}'
          image_name='${{ matrix.config.image_name }}'
          echo "IMAGE_NAME=${image_name}" >> $GITHUB_ENV

      - name: Create multiarch manifests
        id: manifests
        run: |
          set -euo pipefail
          pg_versions='${{ toJSON(matrix.config.pg_versions) }}'

          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          SHA="${{ github.sha }}"
          DATE="$(date +%Y%m%d)"

          # Collect versions for output
          CREATED_VERSIONS=""

          for pg_major in $(echo "$pg_versions" | jq -r '.[]'); do
            echo "=== Creating multiarch manifest for PG ${pg_major} ==="

            # Pick the per-arch image tags produced by the build jobs
            case "$pg_major" in
              14)
                AMD_TAG="${SHA}-pg14-amd64"
                ARM_TAG="${SHA}-pg14-arm64"
                FINAL_SHA_TAG="${SHA}-pg14"
                ;;
              15)
                AMD_TAG="${SHA}-pg15-amd64"
                ARM_TAG="${SHA}-pg15-arm64"
                FINAL_SHA_TAG="${SHA}-pg15"
                ;;
              16)
                AMD_TAG="${SHA}-pg16-amd64"
                ARM_TAG="${SHA}-pg16-arm64"
                FINAL_SHA_TAG="${SHA}-pg16"
                ;;
              17)
                AMD_TAG="${SHA}-pg17-amd64"
                ARM_TAG="${SHA}-pg17-arm64"
                # 17 remains the "default" SHA tag with no suffix
                FINAL_SHA_TAG="${SHA}"
                ;;
              18)
                AMD_TAG="${SHA}-pg18-amd64"
                ARM_TAG="${SHA}-pg18-arm64"
                FINAL_SHA_TAG="${SHA}-pg18"
                ;;
              *)
                echo "Unsupported PG version: $pg_major"; exit 1
                ;;
            esac

            # Resolve the actual Postgres version from the built image (e.g., 17.6)
            PG_VERSION="$(docker run --rm "${IMAGE}:${AMD_TAG}" postgres -V | awk '{print $3}')"
            echo "Resolved PG_VERSION=${PG_VERSION}; DATE=${DATE}"

            # Create ONE multi-arch manifest and attach all desired tags
            docker buildx imagetools create \
              -t "${IMAGE}:${FINAL_SHA_TAG}" \
              -t "${IMAGE}:${PG_VERSION}" \
              -t "${IMAGE}:${PG_VERSION}-${DATE}" \
              "${IMAGE}:${AMD_TAG}" \
              "${IMAGE}:${ARM_TAG}"

            # Optional: also tag 'latest' on main for PG17
            if [[ "${{ github.ref }}" == "refs/heads/main" && "$pg_major" == "17" ]]; then
              docker buildx imagetools create \
                -t "${IMAGE}:latest" \
                "${IMAGE}:${AMD_TAG}" \
                "${IMAGE}:${ARM_TAG}"
            fi

            echo "Created: ${IMAGE}:${FINAL_SHA_TAG}, ${IMAGE}:${PG_VERSION}, ${IMAGE}:${PG_VERSION}-${DATE}"
            docker buildx imagetools inspect "${IMAGE}:${PG_VERSION}" >/dev/null

            # Collect version
            if [[ -n "$CREATED_VERSIONS" ]]; then
              CREATED_VERSIONS="${CREATED_VERSIONS},${PG_VERSION}"
            else
              CREATED_VERSIONS="${PG_VERSION}"
            fi
          done

          echo "created_versions=${CREATED_VERSIONS}" >> $GITHUB_OUTPUT

      - name: Save version info
        run: |
          mkdir -p version-info
          # Extract short image key from full name (e.g., xataio/postgres-images/cnpg-postgres-plus -> cnpg-postgres-plus)
          IMAGE_KEY=$(echo "${IMAGE_NAME}" | rev | cut -d'/' -f1 | rev)
          echo "${IMAGE_KEY}:${{ steps.manifests.outputs.created_versions }}" > version-info/versions.txt
          cat version-info/versions.txt

      - name: Upload version info
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: version-info-${{ strategy.job-index }}
          path: version-info/

  # Trigger sync workflow to update maki repo
  trigger-sync:
    runs-on: ubuntu-latest
    needs: [create-manifest]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all version artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: version-info-*
          path: all-versions/

      - name: Combine version data and trigger sync
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          set -euo pipefail

          # Combine all version files into single format
          VERSION_DATA=""
          for file in all-versions/*/versions.txt; do
            if [[ -f "$file" ]]; then
              content=$(cat "$file")
              echo "Found: $content"
              if [[ -n "$VERSION_DATA" ]]; then
                VERSION_DATA="${VERSION_DATA}|${content}"
              else
                VERSION_DATA="${content}"
              fi
            fi
          done

          echo "Combined version data: $VERSION_DATA"

          if [[ -z "$VERSION_DATA" ]]; then
            echo "No version data found, skipping sync trigger"
            exit 0
          fi

          # Trigger sync-versions workflow
          gh workflow run sync-versions.yml \
            --field version_data="$VERSION_DATA"

          echo "Triggered sync-versions workflow with: $VERSION_DATA"

  # Summary job
  build-test-publish:
    name: build-test-publish
    runs-on: ubuntu-latest
    needs: [build-test-publish-amd64, build-test-publish-arm64, create-manifest, trigger-sync]
    if: always()
    steps:
      - name: Check job results
        run: |
          amd64_result="${{ needs.build-test-publish-amd64.result }}"
          arm64_result="${{ needs.build-test-publish-arm64.result }}"
          manifest_result="${{ needs.create-manifest.result }}"
          trigger_sync_result="${{ needs.trigger-sync.result }}"

          echo "AMD64 build result: $amd64_result"
          echo "ARM64 build result: $arm64_result"
          echo "Manifest creation result: $manifest_result"
          echo "Trigger sync result: $trigger_sync_result"

          if [[ "$amd64_result" == "failure" || "$arm64_result" == "failure" ]]; then
            echo "One or more build jobs failed"
            exit 1
          fi

          if [[ "${{ github.event_name }}" != "pull_request" && "$manifest_result" == "failure" ]]; then
            echo "Manifest creation failed"
            exit 1
          fi

          echo "All jobs completed successfully"

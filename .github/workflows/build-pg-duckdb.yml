name: Build pg_duckdb .deb packages

on:
  workflow_dispatch:
    inputs:
      pg_duckdb_version:
        description: 'pg_duckdb version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string
      duckdb_version:
        description: 'DuckDB version to embed (e.g., v1.3.2)'
        required: true
        default: 'v1.3.2'
        type: string

env:
  REGISTRY: ghcr.io
  PACKAGE_NAME: xataio/postgres-images/pg-duckdb-pkg

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        postgres: [17, 18]
    env:
      ARCH: amd64
      PG_MAJOR: ${{ matrix.postgres }}
      PG_DUCKDB_VERSION: ${{ inputs.pg_duckdb_version }}
      DUCKDB_VERSION: ${{ inputs.duckdb_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push package image
        run: |
          # Set CNPG base image based on PG version
          CNPG_BASE="ghcr.io/cloudnative-pg/postgresql:${PG_MAJOR}-minimal-bookworm"

          IMAGE_TAG="${REGISTRY}/${PACKAGE_NAME}:${PG_DUCKDB_VERSION}-duckdb${DUCKDB_VERSION}-pg${PG_MAJOR}-${ARCH}"

          echo "Building pg_duckdb package using base: ${CNPG_BASE}"
          echo "Image tag: ${IMAGE_TAG}"

          docker buildx build \
            --platform linux/amd64 \
            --build-arg CNPG_BASE="${CNPG_BASE}" \
            --build-arg PG_MAJOR="${PG_MAJOR}" \
            --build-arg PG_DUCKDB_VERSION="${PG_DUCKDB_VERSION}" \
            --build-arg DUCKDB_VERSION="${DUCKDB_VERSION}" \
            --build-arg ARCH="${ARCH}" \
            -t "${IMAGE_TAG}" \
            --push \
            -f docker/pg-duckdb-pkg/Dockerfile \
            .

          echo "Pushed: ${IMAGE_TAG}"

  build-arm64:
    runs-on:
      group: arm-runners
    strategy:
      matrix:
        postgres: [17, 18]
    env:
      ARCH: arm64
      PG_MAJOR: ${{ matrix.postgres }}
      PG_DUCKDB_VERSION: ${{ inputs.pg_duckdb_version }}
      DUCKDB_VERSION: ${{ inputs.duckdb_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push package image
        run: |
          # Set CNPG base image based on PG version
          CNPG_BASE="ghcr.io/cloudnative-pg/postgresql:${PG_MAJOR}-minimal-bookworm"

          IMAGE_TAG="${REGISTRY}/${PACKAGE_NAME}:${PG_DUCKDB_VERSION}-duckdb${DUCKDB_VERSION}-pg${PG_MAJOR}-${ARCH}"

          echo "Building pg_duckdb package using base: ${CNPG_BASE}"
          echo "Image tag: ${IMAGE_TAG}"

          docker buildx build \
            --platform linux/arm64 \
            --build-arg CNPG_BASE="${CNPG_BASE}" \
            --build-arg PG_MAJOR="${PG_MAJOR}" \
            --build-arg PG_DUCKDB_VERSION="${PG_DUCKDB_VERSION}" \
            --build-arg DUCKDB_VERSION="${DUCKDB_VERSION}" \
            --build-arg ARCH="${ARCH}" \
            -t "${IMAGE_TAG}" \
            --push \
            -f docker/pg-duckdb-pkg/Dockerfile \
            .

          echo "Pushed: ${IMAGE_TAG}"
  create-manifest:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        postgres: [17, 18]
    env:
      PG_MAJOR: ${{ matrix.postgres }}
      PG_DUCKDB_VERSION: ${{ inputs.pg_duckdb_version }}
      DUCKDB_VERSION: ${{ inputs.duckdb_version }}

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          BASE_TAG="${REGISTRY}/${PACKAGE_NAME}:${PG_DUCKDB_VERSION}-duckdb${DUCKDB_VERSION}-pg${PG_MAJOR}"
          AMD64_TAG="${BASE_TAG}-amd64"
          ARM64_TAG="${BASE_TAG}-arm64"

          echo "Creating multi-arch manifest: ${BASE_TAG}"
          echo "  - ${AMD64_TAG}"
          echo "  - ${ARM64_TAG}"

          docker buildx imagetools create \
            -t "${BASE_TAG}" \
            "${AMD64_TAG}" \
            "${ARM64_TAG}"

          echo "Pushed multi-arch manifest: ${BASE_TAG}"
